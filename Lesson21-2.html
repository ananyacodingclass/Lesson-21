<!DOCTYPE html>
<html>
    <head>
        <title>
            JavaScript
        </title>
    </head>
    <body>
        <button type="button" onclick="myButton()">Find the answer!</button>
        <p id="p1"></p>
        <p id="p2"></p>
        <p id="p3"></p>
        <script>
            var b = 3;
            function myButton() {
                var a = 6;
                document.getElementById("p1").innerHTML = b * a;
            }
            document.getElementById("p2").innerHTML = b;
            document.getElementById("p3").innerHTML = a;
        </script>
    </body>
</html>
