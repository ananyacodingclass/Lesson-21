<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript</title>
    </head>
    <body>
        <button onclick="mybutton(3)">Calculate the sum!</button>
        <script>
            function mybutton(a,b)
            {
                if (b=== undefined) {
                    b = 6;
                }
                document.write(a*b);
            }
        </script>
    </body>
</html>
